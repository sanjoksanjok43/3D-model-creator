<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧊 3D Photo Editor & Creator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #0f3460 100%);
            color: white; overflow-x: hidden;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        .header { 
            text-align: center; margin: 30px 0; 
            text-shadow: 0 0 20px #00d4ff;
        }
        .header h1 { font-size: 3.2em; margin-bottom: 10px; }
        .header p { font-size: 1.4em; opacity: 0.9; }
        
        .upload-section, .editor-section {
            background: rgba(255,255,255,0.08); 
            padding: 25px; 
            border-radius: 20px; 
            backdrop-filter: blur(20px); 
            margin: 20px 0;
        }
        
        #photoInput { display: none; }
        .upload-btn {
            width: 100%; padding: 20px; 
            background: linear-gradient(45deg, #00d4ff, #0099cc); 
            color: white; border: none; 
            border-radius: 15px; font-size: 18px; 
            font-weight: bold; cursor: pointer;
        }
        .upload-btn:hover { transform: scale(1.02); }
        
        #photoPreview {
            width: 100%; max-height: 200px; 
            border-radius: 15px; 
            object-fit: cover; display: none;
            box-shadow: 0 10px 30px rgba(0,212,255,0.3);
        }
        
        #viewer { 
            height: 600px; 
            background: radial-gradient(circle, #0a0a2e 0%, #1a0033 70%, #000 100%); 
            border-radius: 25px; 
            margin: 30px 0; 
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        
        .toolbar {
            display: flex; flex-wrap: wrap; 
            gap: 15px; justify-content: center; 
            margin: 20px 0;
        }
        .tool-btn {
            padding: 12px 24px; background: rgba(255,255,255,0.1); 
            color: white; border: 2px solid rgba(255,255,255,0.2); 
            border-radius: 25px; cursor: pointer; 
            transition: all 0.3s; font-weight: bold;
        }
        .tool-btn:hover, .tool-btn.active { 
            background: #00d4ff; border-color: #00d4ff; 
            transform: translateY(-2px);
        }
        
        .customize-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); 
            gap: 20px; margin: 30px 0;
        }
        .color-group { text-align: center; }
        .color-group input[type=color] { 
            width: 80px; height: 80px; 
            border-radius: 50%; border: 4px solid white; 
            cursor: pointer; display: block; margin: 10px auto;
        }
        input[type=range] { width: 100%; height: 8px; }
        
        .objects-panel {
            background: rgba(0,0,0,0.3); padding: 20px; 
            border-radius: 15px; margin: 20px 0;
        }
        .object-btn {
            display: inline-block; padding: 10px 20px; 
            margin: 5px; background: rgba(255,255,255,0.2); 
            border-radius: 20px; cursor: pointer;
        }
        
        .download-section { text-align: center; margin: 40px 0; }
        .download-btn {
            display: inline-block; padding: 20px 50px; 
            background: linear-gradient(45deg, #ff6b6b, #ee5a52); 
            color: white; text-decoration: none; 
            border-radius: 50px; font-weight: bold; 
            font-size: 20px; box-shadow: 0 10px 30px rgba(255,107,107,0.4);
        }
        
        @media (max-width: 768px) {
            #viewer { height: 400px; }
            .header h1 { font-size: 2em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧊 3D Photo Editor</h1>
            <p>Upload photo → 3D effect → Customize → Add objects → Download!</p>
        </div>

        <div class="upload-section">
            <h3>📸 Upload Your Photo</h3>
            <input type="file" id="photoInput" accept="image/*" onchange="loadPhoto()">
            <button class="upload-btn" onclick="document.getElementById('photoInput').click()">
                📁 Choose Image
            </button>
            <img id="photoPreview" alt="Photo preview">
        </div>

        <div class="toolbar">
            <button class="tool-btn active" onclick="setTool('photo')">🖼️ Photo</button>
            <button class="tool-btn" onclick="setTool('generate')">✨ Generate</button>
            <button class="tool-btn" onclick="randomScene()">🎲 Random</button>
            <button class="tool-btn" onclick="resetScene()">🔄 Reset</button>
        </div>

        <div id="viewer"></div>

        <div class="customize-grid">
            <div class="color-group">
                <label>🎨 Main Color</label>
                <input type="color" id="mainColor" value="#ff6b6b" onchange="updateColors()">
            </div>
            <div class="color-group">
                <label>✨ Glow Color</label>
                <input type="color" id="glowColor" value="#00d4ff" onchange="updateColors()">
            </div>
            <div class="color-group">
                <label>📏 Scale</label>
                <input type="range" id="scaleSlider" min="0.3" max="2.5" value="1" step="0.1" oninput="updateScale()">
                <span id="scaleValue">1.0</span>
            </div>
            <div class="color-group">
                <label>💫 Rotation Speed</label>
                <input type="range" id="rotationSpeed" min="0" max="0.05" value="0.01" step="0.001" oninput="updateRotationSpeed()">
            </div>
        </div>

        <div class="objects-panel">
            <h3>➕ Add Objects:</h3>
            <button class="object-btn" onclick="addObject('sphere')">⚪ Sphere</button>
            <button class="object-btn" onclick="addObject('cube')">⬜ Cube</button>
            <button class="object-btn" onclick="addObject('torus')">🛞 Torus</button>
            <button class="object-btn" onclick="addObject('cylinder')">🛢️ Cylinder</button>
            <button class="object-btn" onclick="clearObjects()">🗑️ Clear All</button>
        </div>

        <div class="download-section">
            <a id="downloadLink" class="download-btn" style="display:none;" download="my-3d-creation.glb">
                💾 Download 3D Model (GLB)
            </a>
        </div>
    </div>

    <script>
        // 3D Scene Setup
        let scene, camera, renderer, controls, photoTexture, mainObject, objects = [];
        let currentTool = 'photo';
        let rotationSpeed = 0.01;

        function initScene() {
            const container = document.getElementById('viewer');
            
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a2e);
            
            // Camera
            camera = new THREE.PerspectiveCamera(60, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(0, 0, 4);
            
            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);
            
            // Lighting
            const ambient = new THREE.AmbientLight(0x404040, 0.4);
            scene.add(ambient);
            
            const dirLight = new THREE.DirectionalLight(0xffffff, 1);
            dirLight.position.set(5, 10, 5);
            dirLight.castShadow = true;
            scene.add(dirLight);
            
            // Point light for glow
            const pointLight = new THREE.PointLight(0x00d4ff, 1, 100);
            pointLight.position.set(0, 2, 2);
            scene.add(pointLight);
            
            // Controls
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            
            animate();
            window.addEventListener('resize', onWindowResize);
        }

        function loadPhoto() {
            const file = document.getElementById('photoInput').files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    // Create photo texture
                    photoTexture = new THREE.TextureLoader().load(e.target.result);
                    
                    // Photo plane
                    const geometry = new THREE.PlaneGeometry(3, 2);
                    const material = new THREE.MeshPhongMaterial({ 
                        map: photoTexture,
                        transparent: true,
                        opacity: 0.95
                    });
                    
                    if (mainObject) scene.remove(mainObject);
                    mainObject = new THREE.Mesh(geometry, material);
                    mainObject.position.z = 0;
                    scene.add(mainObject);
                    
                    document.getElementById('photoPreview').src = e.target.result;
                    document.getElementById('photoPreview').style.display = 'block';
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function setTool(tool) {
            currentTool = tool;
            document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }

        function addObject(type) {
            const geometries = {
                sphere: new THREE.SphereGeometry(0.5, 32, 32),
                cube: new THREE.BoxGeometry(0.8, 0.8, 0.8),
                torus: new THREE.TorusGeometry(0.6, 0.2, 16, 100),
                cylinder: new THREE.CylinderGeometry(0.4, 0.4, 1, 32)
            };
            
            const geometry = geometries[type];
            const material = new THREE.MeshPhongMaterial({ 
                color: new THREE.Color().setHSL(Math.random(), 0.8, 0.6),
                transparent: true,
                opacity: 0.9
            });
            
            const obj = new THREE.Mesh(geometry, material);
            obj.position.set(
                (Math.random() - 0.5) * 4,
                (Math.random() - 0.5) * 2,
                (Math.random() - 0.5) * 4
            );
            obj.castShadow = true;
            scene.add(obj);
            objects.push(obj);
        }

        function clearObjects() {
            objects.forEach(obj => scene.remove(obj));
            objects = [];
        }

        function updateColors() {
            if (!mainObject) return;
            const color1 = document.getElementById('mainColor').value;
            mainObject.material.color.setHex(parseInt(color1.replace('#', '0x')));
        }

        function updateScale() {
            const value = document.getElementById('scaleSlider').value;
            document.getElementById('scaleValue').textContent = value;
            if (mainObject) mainObject.scale.setScalar(parseFloat(value));
        }

        function updateRotationSpeed() {
            rotationSpeed = parseFloat(document.getElementById('rotationSpeed').value);
        }

        function randomScene() {
            clearObjects();
            
            // Random photo effect
            if (!photoTexture) {
                const canvas = document.createElement('canvas');
                canvas.width = 512; canvas.height = 512;
                const ctx = canvas.getContext('2d');
                const gradient = ctx.createRadialGradient(256, 256, 0, 256, 256, 256);
                gradient.addColorStop(0, '#ff6b6b');
                gradient.addColorStop(1, '#4ecdc4');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, 512, 512);
                photoTexture = new THREE.CanvasTexture(canvas);
            }
            
            // Add random objects
            for (let i = 0; i < 5; i++) addObject(['sphere','cube','torus'][Math.floor(Math.random()*3)]);
        }

        function resetScene() {
            clearObjects();
            if (mainObject) {
                mainObject.scale.set(1,1,1);
                mainObject.rotation.set(0,0,0);
            }
            controls.reset();
        }

        function animate() {
            requestAnimationFrame(animate);
            
            if (mainObject) {
                mainObject.rotation.y += rotationSpeed;
                mainObject.rotation.x += rotationSpeed * 0.5;
            }
            
            objects.forEach((obj, i) => {
                obj.rotation.y += 0.02;
                obj.rotation.x += 0.01;
                obj.position.y += Math.sin(Date.now() * 0.001 + i) * 0.005;
            });
            
            controls.update();
            renderer.render(scene, camera);
        }

        function onWindowResize() {
            const container = document.getElementById('viewer');
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }

        // Download (placeholder - real GLTF export)
        document.getElementById('downloadLink').onclick = function() {
            const dataStr = "3D model exported! (Full GLTF coming soon)";
            const dataUri = 'data:application/octet-stream;base64,'+btoa(dataStr);
            this.href = dataUri;
        };

        // Initialize
        initScene();
    </script>
</body>
</html>
